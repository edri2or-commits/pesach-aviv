<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>פסח בא 🌸</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    /* ══════════════════════════════════════════
       BODY — spring gradient background
    ══════════════════════════════════════════ */
    body {
      font-family: 'Heebo', 'Arial Hebrew', Arial, sans-serif;
      direction: rtl;
      min-height: 100vh;
      background:
        linear-gradient(180deg,
          #ffccd8 0%, #ffd9e4 8%, #fff0d0 25%, #f5ffd0 45%,
          #d0f0a0 65%, #90d060 85%, #5aaa30 100%);
      overflow-x: hidden;
      position: relative;
    }

    /* ── Animated gradient shift on body ──── */
    @keyframes gradientShift {
      0%   { filter: hue-rotate(0deg) brightness(1); }
      25%  { filter: hue-rotate(8deg) brightness(1.04); }
      50%  { filter: hue-rotate(0deg) brightness(1.06); }
      75%  { filter: hue-rotate(-6deg) brightness(1.03); }
      100% { filter: hue-rotate(0deg) brightness(1); }
    }
    body { animation: gradientShift 14s ease-in-out infinite; }

    /* ── Floating flower row layer 1 (slow) ── */
    body::before {
      content: '🌸🌼🌺🦋🌸🌼🌺🌸🌼🦋🌺🌸🌸🌼🌺🦋🌸🌼🌺🌸🌼🦋🌺🌸';
      position: fixed;
      top: -8px;
      left: 0;
      font-size: 26px;
      white-space: nowrap;
      pointer-events: none;
      z-index: 0;
      opacity: 0.22;
      animation: floatRow1 28s linear infinite;
      width: 200%;
    }
    @keyframes floatRow1 {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* ── Floating flower row layer 2 (medium, offset) ── */
    body::after {
      content: '🌷🌻🍀🌸🌷🌻🌸🍀🌷🌻🌸🌷🌻🍀🌸🌷🌻🌸🍀🌷🌻🌸🌷🌻';
      position: fixed;
      top: 38px;
      left: 0;
      font-size: 20px;
      white-space: nowrap;
      pointer-events: none;
      z-index: 0;
      opacity: 0.14;
      animation: floatRow2 20s linear infinite;
      width: 200%;
    }
    @keyframes floatRow2 {
      0%   { transform: translateX(-50%); }
      100% { transform: translateX(0); }
    }

    /* ── Floating petals (subtle sparkle layer) ── */
    .bg-petals {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .petal {
      position: absolute;
      font-size: 18px;
      opacity: 0;
      animation: petalFall linear infinite;
    }
    .petal:nth-child(1)  { left:5%;   animation-duration:8s;  animation-delay:0s;   }
    .petal:nth-child(2)  { left:12%;  animation-duration:11s; animation-delay:1.5s; }
    .petal:nth-child(3)  { left:22%;  animation-duration:9s;  animation-delay:3s;   }
    .petal:nth-child(4)  { left:35%;  animation-duration:13s; animation-delay:0.5s; }
    .petal:nth-child(5)  { left:48%;  animation-duration:10s; animation-delay:2s;   }
    .petal:nth-child(6)  { left:58%;  animation-duration:12s; animation-delay:4s;   }
    .petal:nth-child(7)  { left:68%;  animation-duration:8.5s;animation-delay:1s;   }
    .petal:nth-child(8)  { left:78%;  animation-duration:11s; animation-delay:3.5s; }
    .petal:nth-child(9)  { left:88%;  animation-duration:9.5s;animation-delay:0.8s; }
    .petal:nth-child(10) { left:94%;  animation-duration:14s; animation-delay:2.5s; }
    @keyframes petalFall {
      0%   { transform: translateY(-60px) rotate(0deg);   opacity:0; }
      10%  { opacity: 0.55; }
      90%  { opacity: 0.3; }
      100% { transform: translateY(100vh) rotate(360deg); opacity:0; }
    }

    /* ══════════════════════════════════════════
       PAGE WRAPPER
    ══════════════════════════════════════════ */
    .page {
      position: relative; z-index: 2;
      max-width: 520px;
      margin: 0 auto;
      display: flex; flex-direction: column;
      min-height: 100vh;
      padding-bottom: 28px;
    }

    /* ══════════════════════════════════════════
       TITLE AREA
    ══════════════════════════════════════════ */
    .title-wrap {
      position: relative;
      padding: 22px 20px 0;
      text-align: center;
    }
    .title-glow {
      display: inline-block;
      position: relative;
    }
    .title-glow::before {
      content: '';
      position: absolute;
      inset: -14px -20px;
      background: radial-gradient(ellipse, rgba(255,200,80,.45) 0%, transparent 70%);
      border-radius: 50%;
      z-index: -1;
      animation: glow 3s ease-in-out infinite alternate;
    }
    @keyframes glow {
      from { opacity:.5; transform: scale(.95); }
      to   { opacity:1;  transform: scale(1.05); }
    }
    .title-glow img {
      width: min(90%, 370px);
      filter: drop-shadow(0 4px 14px rgba(200,60,100,.25))
              drop-shadow(0 2px 6px rgba(255,200,60,.4));
      animation: popIn .7s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes popIn {
      from { opacity:0; transform:scale(.7); }
      to   { opacity:1; transform:scale(1);  }
    }

    /* ══════════════════════════════════════════
       CARDS
    ══════════════════════════════════════════ */
    .cards {
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding: 18px 16px 8px;
      flex: 1;
    }

    .card {
      background: rgba(255,253,240,0.96);
      border-radius: 22px;
      box-shadow:
        0 8px 32px rgba(0,0,0,.15),
        0 0 0 2px rgba(255,255,255,.6),
        inset 0 1px 0 rgba(255,255,255,.9);
      overflow: hidden;
      cursor: pointer;
      text-decoration: none;
      display: block;
      transition: transform .18s ease, box-shadow .18s ease;
      animation: slideUp .55s cubic-bezier(.34,1.56,.64,1) both;
      -webkit-tap-highlight-color: transparent;
      border: 3px solid transparent;
    }
    @keyframes slideUp {
      from { opacity:0; transform:translateY(30px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .card:nth-child(1) {
      animation-delay: .08s;
      background:
        linear-gradient(rgba(255,253,240,.97),rgba(255,253,240,.97)) padding-box,
        linear-gradient(135deg,#f9c84a,#e8801a) border-box;
    }
    .card:nth-child(2) {
      animation-delay: .2s;
      background:
        linear-gradient(rgba(248,240,255,.97),rgba(248,240,255,.97)) padding-box,
        linear-gradient(135deg,#d084fc,#7928ca) border-box;
    }
    .card:nth-child(3) {
      animation-delay: .32s;
      background:
        linear-gradient(rgba(235,250,255,.97),rgba(235,250,255,.97)) padding-box,
        linear-gradient(135deg,#40bcd8,#0d7090) border-box;
    }

    .card:active, .card:hover {
      transform: scale(0.972) translateY(-2px);
      box-shadow: 0 14px 40px rgba(0,0,0,.2);
    }

    /* ── Card image ─────────────────────────── */
    .card-img {
      width: 100%;
      height: 220px;
      overflow: hidden;
      position: relative;
    }
    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 35%;
    }
    .card-img::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, transparent 60%, rgba(0,0,0,.08) 100%);
    }

    /* ── Butterfly placeholder ─────────────── */
    .butterfly-bg {
      height: 220px;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg,#ffe8f8,#f0e6ff,#e8f4ff);
      position: relative;
    }

    /* ── Card body ──────────────────────────── */
    .card-body {
      padding: 14px 18px 18px;
      text-align: center;
    }
    .card-title {
      font-size: 1.5rem;
      font-weight: 900;
      line-height: 1.2;
      margin-bottom: 5px;
      color: #3a2800;
    }
    .card:nth-child(2) .card-title { color: #4a0e7a; }
    .card:nth-child(3) .card-title { color: #0c4a5a; }

    .card-subtitle {
      font-size: 1rem;
      color: #666;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 10px;
    }

    /* ── Tap badge ──────────────────────────── */
    .tap-badge {
      display: inline-block;
      padding: 7px 22px;
      border-radius: 999px;
      font-size: .88rem;
      font-weight: 800;
      color: #fff;
      box-shadow: 0 3px 10px rgba(0,0,0,.18);
      letter-spacing: .3px;
    }
    .card:nth-child(1) .tap-badge {
      background: linear-gradient(135deg, #f5c842, #e07010);
    }
    .card:nth-child(2) .tap-badge {
      background: linear-gradient(135deg, #d084fc, #7928ca);
    }
    .card:nth-child(3) .tap-badge {
      background: linear-gradient(135deg, #40bcd8, #0d7090);
    }

    /* ══════════════════════════════════════════
       GRASS STRIP
    ══════════════════════════════════════════ */
    .grass {
      text-align: center;
      font-size: 1.6rem;
      line-height: 1;
      margin-top: 6px;
      letter-spacing: -4px;
      filter: drop-shadow(0 -2px 4px rgba(80,150,40,.3));
    }

    /* ══════════════════════════════════════════
       FOOTER
    ══════════════════════════════════════════ */
    .footer {
      text-align: center;
      padding: 14px 20px 4px;
      font-size: 1.05rem;
      font-weight: 700;
      color: #3a5a10;
      text-shadow: 0 1px 3px rgba(255,255,255,.7);
      cursor: default;
    }
  </style>
</head>
